<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduStream | My E-Learning Platform</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <h2>Edu<span>Stream</span></h2>
            </div>
            <nav class="lesson-list">
                <h3>Course Content</h3>
                <ul id="playlist">
                    <li class="active" onclick="changeVideo('vid1.mp4', 'Introduction to HTML')">
                        <span class="status">✔</span> 1. Introduction to HTML
                    </li>
                    <li onclick="changeVideo('vid2.mp4', 'Styling with CSS')">
                        <span class="status"></span> 2. Styling with CSS
                    </li>
                    <li onclick="changeVideo('vid3.mp4', 'JavaScript Basics')">
                        <span class="status"></span> 3. JavaScript Basics
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1 id="current-lesson-title">Introduction to HTML</h1>
                <button class="btn-complete">Mark as Complete</button>
            </header>

            <div class="video-container">
                <video id="main-video" controls poster="https://via.placeholder.com/800x450">
                    <source src="assets/videos/intro.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>

            <section class="description">
                <h3>About this lesson</h3>
                <p id="lesson-desc">In this lesson, you will learn the fundamental structure of a web page using HTML tags.</p>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
